      - name: Package release binaries
        run: |
          rm -rf dist firmware.zip
          python scripts/build_release_package.py \
            --build-dir .pio/build/esp32dev \
            --release-dir dist \
            --tag "${{ steps.vars.outputs.tag_name }}" \
            --repository "${{ github.repository }}"
          zip -j firmware.zip \
            dist/firmware.bin \
            dist/update.bin
