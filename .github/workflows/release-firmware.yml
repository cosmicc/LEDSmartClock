name: Release Firmware Package

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag_name:
        description: Git tag to package, upload, and publish
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag name
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag_name=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out packaging tools from default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: tools

      - name: Check out tagged source
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ steps.vars.outputs.tag_name }}
          path: source

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware
        run: pio run -d source -e esp32dev

      - name: Package release binaries and local web installer
        run: |
          rm -rf dist firmware.zip
          python tools/scripts/build_release_package.py \
            --build-dir source/.pio/build/esp32dev \
            --release-dir dist \
            --site-dir dist/web-installer \
            --tag "${{ steps.vars.outputs.tag_name }}" \
            --repository "${{ github.repository }}" \
            --git-commit "$(git -C source rev-parse --short HEAD)" \
            --board-target "esp32dev" \
            --build-date-utc "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          cd dist
          zip -r ../firmware.zip \
            firmware.bin \
            update.bin \
            release-metadata.json \
            web-installer

      - name: Prepare hosted installer artifact
        run: |
          rm -rf dist-pages
          mkdir -p dist-pages/web-installer
          cp dist/firmware.bin dist-pages/firmware.bin
          cp dist/update.bin dist-pages/update.bin
          cp dist/release-metadata.json dist-pages/release-metadata.json
          cp dist/web-installer/index.html dist-pages/web-installer/index.html
          cp dist/web-installer/manifest.json dist-pages/web-installer/manifest.json
          cp dist/web-installer/styles.css dist-pages/web-installer/styles.css
          cat > dist-pages/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=./web-installer/">
              <title>LED SmartClock Web Installer</title>
            </head>
            <body>
              <p>Redirecting to <a href="./web-installer/">the LED SmartClock web installer</a>...</p>
            </body>
          </html>
          EOF
          touch dist-pages/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload firmware.zip to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag_name }}
          files: firmware.zip
          overwrite_files: true

      - name: Upload hosted installer artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist-pages

  deploy-pages:
    needs: build-and-upload
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy hosted installer
        id: deployment
        uses: actions/deploy-pages@v4
