name: Release Firmware Package

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag_name:
        description: Git tag to package and upload
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.vars.outputs.tag_name }}

    steps:
      - name: Resolve tag name
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag_name=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out tagged source
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ steps.vars.outputs.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware
        run: pio run -e esp32dev

      - name: Package release binaries and installer site
        run: |
          rm -rf dist site firmware.zip
          python scripts/build_release_package.py \
            --build-dir .pio/build/esp32dev \
            --release-dir dist \
            --site-dir site \
            --tag "${{ steps.vars.outputs.tag_name }}" \
            --repository "${{ github.repository }}"
          zip -j firmware.zip \
            dist/firmware.bin \
            dist/update.bin \
            dist/installer.txt

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload firmware.zip to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag_name }}
          files: firmware.zip
          overwrite_files: true

      - name: Upload installer site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: build-and-upload
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy installer site
        id: deployment
        uses: actions/deploy-pages@v4
